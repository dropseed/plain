[project]
name = "plain.schema"
version = "0.0.0"
description = "Validating parsers for typed Python data."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
# plain.templates (SchemaView) and plain.postgres (ModelSchema) are pulled
# in only for plain/schema/views.py and plain/schema/modelschema.py, which
# live here temporarily while the schema view/model design is iterated on.
dependencies = [
  "plain>=0.145.0,<1.0.0",
  "plain.templates>=0.2.0,<1.0.0",
  "plain.postgres>=0.103.0,<1.0.0",
]

[dependency-groups]
dev = ["plain.pytest<1.0.0", "hypothesis>=6.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
