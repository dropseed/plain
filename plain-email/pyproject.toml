[project]
name = "plain.email"
version = "0.20.0"
description = "Everything you need to send email in Plain."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
license = "BSD-3-Clause"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["plain>=0.143.0,<1.0.0", "plain.templates>=0.1.0,<1.0.0"]

# Test lifecycle discovered by plain.testing
[project.entry-points."plain.testing"]
"email" = "plain.email.test.lifecycle:EmailTestLifecycle"

[dependency-groups]
dev = ["plain.testing<1.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
