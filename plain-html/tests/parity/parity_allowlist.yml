# Parity allowlist — intentional differences between Jinja and plain.html output.
#
# Each entry pins a known-acceptable rendering difference, with rationale.
# The harness still surfaces the difference in artifacts; this file records
# why it is not a regression.
#
# Pre-migration this file is informational. Once the harness runs as a pytest
# assertion (Phase 7 of the implementation plan), entries here will suppress
# the assertion failure but still print the diff for inspection.

differences:
  - id: inter-tag-whitespace
    severity: cosmetic
    fixtures: ["*"]
    description: |
      Jinja preserves the blank lines and indentation surrounding
      {% if %} / {% endif %} blocks; plain.html attaches directives to
      individual elements, so the wrapper whitespace simply isn't there.
      Output is structurally equivalent — whitespace-normalization erases
      the difference.
    plan: |
      Acceptable. The normalized diff is the authoritative comparison.

  - id: escape-entity-style
    severity: cosmetic
    fixtures: ["greeting"]
    description: |
      Jinja autoescape (via markupsafe) emits `&#34;` and `&#39;` for `"` and
      `'`. plain.html escapes via `plain.utils.html.conditional_escape`, which
      uses the stdlib `html.escape` and emits the named entities `&quot;` and
      `&#x27;`. Both are HTML-equivalent — browsers render identically.
    plan: |
      Acceptable. Aligning entity style is a one-line change in either
      direction; deferred until the post-migration period when there's only
      one renderer and "Jinja-compatible" stops being a constraint.

  - id: boolean-attribute-rendering
    severity: spec-intentional
    fixtures: ["tasks_list"]
    description: |
      A Python `True` value emitted into an HTML attribute renders as the
      bare attribute name (`<li data-done>`) under plain.html, per the
      spec's "HTML-aware attribute semantics" section. Jinja stringifies
      it as the literal text "True" (`data-done="True"`).

      A `False` / `None` value omits the attribute entirely under
      plain.html, where Jinja renders the literal "False".
    plan: |
      Spec-intentional. plain.html implements HTML's boolean-attribute
      convention; Jinja has no concept of boolean attributes. Migrated
      templates should rely on the new behavior; templates that need the
      old behavior should stringify the value explicitly
      (`data-done={"true" if task.done else "false"}`).
