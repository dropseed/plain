---
attrs:
  value: Any = None
  field: Any = None
  object: Any = None
---
<span :if={not value} class="text-admin-muted-foreground italic">Not set</span>
<template :if={value and '$' in value}>
<span class="inline-flex items-center gap-1.5 text-admin-muted-foreground">
    <i class="bi bi-asterisk text-[10px]"></i>
    <span class="text-[10px] tracking-wide uppercase bg-admin-muted rounded px-1.5 py-px">{value.split('$', 2)[0].replace("_", "-").upper()}<template :if={len(value.split('$', 2)) > 1 and value.split('$', 2)[1].isdigit()}> · {"{:,}".format(int(value.split('$', 2)[1]))} iterations</template></span>
</span>
</template>
