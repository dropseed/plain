{% if not value %}
<span class="text-admin-muted-foreground italic">Not set</span>
{% elif '$' in value %}
{% set parts = value.split('$', 2) %}
<span class="inline-flex items-center gap-1.5 text-admin-muted-foreground">
    <i class="bi bi-asterisk text-[10px]"></i>
    <span
        class="text-[10px] tracking-wide uppercase bg-admin-muted rounded px-1.5 py-px"
    >{{ parts[0] | replace("_", "-") | upper }}{% if parts[1] is defined and parts[1].isdigit() %} · {{ "{:,}".format(parts[1] | int) }} iterations{% endif %}</span>
</span>
{% endif %}
