name: claude-code-review
on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write
  # Lets the action exchange an OIDC token for a Claude GitHub App token,
  # so reviews post as the branded app instead of github-actions[bot].
  id-token: write

jobs:
  review:
    # Job-level so that skipped runs (e.g. unrelated PR comments) never enter
    # the group and cancel a review in progress.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
      cancel-in-progress: true
    # Automatic on non-draft PRs from this repo (fork PRs can't read the token
    # secret), or manually via an "@claude review" PR comment from a
    # collaborator, or via workflow_dispatch with a PR number.
    if: >-
      (github.event_name == 'pull_request' &&
       !github.event.pull_request.draft &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude review') &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The pull_request trigger already excludes fork PRs, but comment and
      # dispatch triggers only know a PR number — look up whether it's a fork.
      - name: Check for fork PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fork=$(gh pr view "${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}" \
            -R "${{ github.repository }}" --json isCrossRepository -q .isCrossRepository)
          echo "fork=$fork" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.fork == 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}"
          # Always end with a submitted PR review, even when clean — it's the
          # visible "this ran" record, and tools that wait on bot reviews
          # (e.g. PullApprove agents) treat a submitted review as the answer.
          claude_args: |
            --model opus
            --append-system-prompt "After completing the review, always submit a GitHub review on the pull request with 'gh pr review <number> --comment --body <summary>'. Summarize the findings, or state that no issues were found. Do this even when the review is clean."
            --allowedTools "Bash(gh pr review:*)"
