{% extends "admin/base.html" %}

{% block content %}

<div class="max-w-lg">
    <div class="alert-danger w-full">
        <admin.Icon name="exclamation-triangle" />
        <h4>Delete this item?</h4>
        <section>This action cannot be undone. The item and all associated data will be permanently removed.</section>
        <form method="post" class="col-start-2 mt-4 flex items-center justify-end space-x-3">
            <a href="{{ request.headers.get('Referer', '..') }}" class="btn-outline no-underline">
                Cancel
            </a>
            <button type="submit" class="btn-danger">
                Yes, delete
            </button>
        </form>
    </div>
</div>

{% endblock %}
