---
imports:
  - from plain.html import mark_safe
  - from plain.utils.safestring import mark_safe
components:
  - elements/admin/Icon
attrs:
  markup: str
  caption: str = ""
---
{# Used only by admin/ui.html. Renders the markup once live and once as
   visible escaped source inside a <details> disclosure. #}
<figure
    class="my-3 rounded-admin-lg border border-admin-border bg-admin-card text-admin-card-foreground"
>
    <div class="p-6 flex flex-wrap items-center gap-3 border-b border-admin-border">
        {{ mark_safe(markup) }}
    </div>
    <details class="group">
        <summary
            class="cursor-pointer select-none px-4 py-2 text-xs text-admin-muted-foreground hover:text-admin-foreground flex items-center gap-2"
        >
            <Icon name="code-slash" />
            <span>Show markup{{ " — " + caption if caption else "" }}</span>
        </summary>
        <pre class="m-0! rounded-none! border-none! text-xs"><code>{{ markup }}</code></pre>
    </details>
</figure>
