<div class="flex items-center space-x-1">
    {% if impersonator %}
    <div class="flex items-center font-light">
        Impersonating&nbsp;<span class="font-medium">{{ user }}</span>
        <a href="{{ url('admin:impersonate:stop') }}" title="Stop impersonating" class="flex items-center px-1 ml-1 text-red-300 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="w-4 h-4 bi bi-x-octagon-fill" viewBox="0 0 16 16">
                <path d="M11.46.146A.5.5 0 0 0 11.107 0H4.893a.5.5 0 0 0-.353.146L.146 4.54A.5.5 0 0 0 0 4.893v6.214a.5.5 0 0 0 .146.353l4.394 4.394a.5.5 0 0 0 .353.146h6.214a.5.5 0 0 0 .353-.146l4.394-4.394a.5.5 0 0 0 .146-.353V4.893a.5.5 0 0 0-.146-.353L11.46.146zm-6.106 4.5L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 1 1 .708-.708z"/>
            </svg>
        </a>
    </div>
    {% endif %}

    {% set preflight_total = preflight_counts.errors + preflight_counts.warnings %}
    {% if preflight_total > 0 %}
    <a
        href="{{ url('admin:preflight') }}"
        class="relative inline-flex items-center mr-2 hover:text-white text-white/50"
        title="Preflight checks"
    >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="w-3 h-3" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m2.146 5.146a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-2-2a.5.5 0 0 1 .708-.708L6.5 8.793z"/>
        </svg>
        <span
            class="absolute -top-1 -right-1.5 min-w-[12px] h-3 px-0.5 text-[8px] font-bold leading-3 text-center text-white rounded-full {{ 'bg-red-500' if preflight_counts.errors > 0 else 'bg-amber-500' }}"
        >{{ preflight_total }}</span>
    </a>
    {% endif %}

    <a href="{{ url('admin:index') }}" class="hover:underline">Admin</a>

    {% if object_admin_url|default(false) %}
    <span>→</span>
    <a href="{{ object_admin_url }}" class="hover:underline">
        {{ object_class_name }}
    </a>
    {% endif %}
</div>
