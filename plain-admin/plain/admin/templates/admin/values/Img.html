---
attrs:
  value: Any = None
  field: Any = None
  object: Any = None
---
{% if value is None %}<span class="text-admin-muted-foreground/80 font-mono text-sm">None</span>{% endif %}
{% if value == "" %}<span class="text-admin-muted-foreground/50">—</span>{% endif %}
{% if isinstance(value, str) and value %}<img src="{{ value }}" alt="" class="max-h-8">{% endif %}
{% if value and not isinstance(value, str) %}<img src="{{ value.src }}" alt="{{ value.alt }}" class="max-h-8">{% endif %}
