---
attrs:
  value: Any = None
  field: Any = None
  object: Any = None
---
{% if object["source"] == 'env' %}<span class="admin-badge admin-badge-warning font-mono">{{ value }}</span>{% endif %}
{% if object["source"] == 'explicit' %}<span class="admin-badge admin-badge-outline">{{ value }}</span>{% endif %}
{% if object["source"] not in ('env', 'explicit') %}<span class="admin-badge admin-badge-secondary">{{ value }}</span>{% endif %}
