<input
    id="{{ field.html_id }}"
    class="input"
    type="{{ type|default('text') }}"
    name="{{ field.html_name }}"
    {% if list is defined %}list="{{ list }}"{% endif %}
    {% if field.value() != None %}value="{{ field.value() }}"{% endif %}
    {% if field.field.required %}required{% endif %}
    {% if field.errors %}aria-invalid="true"{% endif %}
    >
