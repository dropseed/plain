<input
    id="{{ field.html_id }}"
    class="admin-input"
    type="{{ type|default('text') }}"
    name="{{ field.name }}"
    {% if list is defined %}list="{{ list }}"{% endif %}
    value="{{ field.value }}"
    {% if field.required %}required{% endif %}
    {% if field.errors %}aria-invalid="true"{% endif %}
    >
