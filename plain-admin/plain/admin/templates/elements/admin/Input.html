<input
    id="{{ field.html_id }}"
    class="admin-input"
    type="{{ type|default('text') }}"
    name="{{ field.name }}"
    {% if list is defined %}list="{{ list }}"{% endif %}
    value="{{ field_value(form, field) }}"
    {% if field.required %}required{% endif %}
    {% if field_errors(form, field) %}aria-invalid="true"{% endif %}
    >
