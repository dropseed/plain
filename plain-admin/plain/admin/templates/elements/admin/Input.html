---
attrs:
  field: Any
  type: str = "text"
  list: str = ""
---
<input
    id="{{ field.html_id }}"
    class="admin-input"
    type="{{ type }}"
    name="{{ field.name }}"
    list="{{ list or None }}"
    value="{{ field.value if field.value is not None else None }}"
    required="{{ field.required }}"
    aria-invalid="{{ 'true' if field.errors else None }}"
>
