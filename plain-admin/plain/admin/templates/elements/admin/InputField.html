---
components:
  - elements/admin/Label
  - elements/admin/Input
  - elements/admin/Help
  - elements/admin/FieldErrors
attrs:
  field: Any
  label: str
  type: str = "text"
  help: str = ""
---
<div class="space-y-1">
    <Label field={field}>{label}</Label>
    <Input field={field} type={type} />
    <Help :if={help} help={help} />
    <FieldErrors field={field} />
</div>
