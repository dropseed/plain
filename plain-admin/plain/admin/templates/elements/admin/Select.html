<select
    id="{{ field.html_id }}"
    name="{{ field.name }}"
    class="admin-select"
    {% if field.required %}required{% endif %}
    {% if field.errors %}aria-invalid="true"{% endif %}
    >
    {% for value, label in field.choices %}
    <option value="{{ value }}" {% if value == field.value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
</select>
