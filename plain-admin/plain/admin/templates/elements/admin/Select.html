---
imports:
  - from plain.forms import field_errors, field_value
attrs:
  form: Any
  field: Any
---
<select
    id="{{ field.html_id }}"
    name="{{ field.name }}"
    class="admin-select"
    required="{{ field.required }}"
    aria-invalid="{{ 'true' if field_errors(form, field) else None }}"
>
    {% for (value, label) in field.choices %}
        <option value="{{ value }}" selected="{{ value == field_value(form, field) }}">{{ label }}</option>
    {% endfor %}
</select>
