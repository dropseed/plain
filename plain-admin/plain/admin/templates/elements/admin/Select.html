---
attrs:
  field: Any
---
<select
    id="{{ field.html_id }}"
    name="{{ field.name }}"
    class="admin-select"
    required="{{ field.required }}"
    aria-invalid="{{ 'true' if field.errors else None }}"
>
    {% for (value, label) in field.choices %}
        <option value="{{ value }}" selected="{{ value == field.value }}">{{ label }}</option>
    {% endfor %}
</select>
