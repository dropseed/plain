---
components:
  - elements/admin/Label
  - elements/admin/Select
  - elements/admin/Help
  - elements/admin/FieldErrors
attrs:
  field: Any
  label: str
  help: str = ""
---
<div class="space-y-1">
    <Label field={field}>{label}</Label>
    <Select field={field} />
    <Help :if={help} help={help} />
    <FieldErrors field={field} />
</div>
