---
components:
  - elements/admin/Label
  - elements/admin/Textarea
  - elements/admin/Help
  - elements/admin/FieldErrors
attrs:
  field: Any
  label: str
  help: str = ""
---
<div class="space-y-1">
    <Label field="{{ field }}">{{ label }}</Label>
    <Textarea field="{{ field }}" />
    {% if help %}
        <Help help="{{ help }}" />
    {% endif %}
    <FieldErrors field="{{ field }}" />
</div>
