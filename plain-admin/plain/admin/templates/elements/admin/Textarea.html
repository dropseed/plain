---
attrs:
  field: Any
  rows: int = 3
  spellcheck: str = "default"
---
<textarea
    id="{{ field.html_id }}"
    class="admin-textarea"
    name="{{ field.name }}"
    rows="{{ rows }}"
    spellcheck="{{ spellcheck }}"
    required="{{ field.required }}"
    aria-invalid="{{ 'true' if field.errors else None }}"
>{{ field.value or "" }}</textarea>
