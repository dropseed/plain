<textarea
    id="{{ field.html_id }}"
    class="admin-textarea"
    name="{{ field.name }}"
    rows="{{ rows|default(3) }}"
    spellcheck="{{ spellcheck|default('default') }}"
    {% if field.required %}required{% endif %}
    {% if field_errors(form, field) %}aria-invalid="true"{% endif %}
    >{{ field_value(form, field) }}</textarea>
