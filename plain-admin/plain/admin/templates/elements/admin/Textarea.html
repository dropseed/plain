---
imports:
  - from plain.forms import field_errors, field_value
attrs:
  form: Any
  field: Any
  rows: int = 3
  spellcheck: str = "default"
---
<textarea
    id="{{ field.html_id }}"
    class="admin-textarea"
    name="{{ field.name }}"
    rows="{{ rows }}"
    spellcheck="{{ spellcheck }}"
    required="{{ field.required }}"
    aria-invalid="{{ 'true' if field_errors(form, field) else None }}"
>{{ field_value(form, field) or "" }}</textarea>
