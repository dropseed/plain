---
components:
  - elements/admin/Checkbox
  - elements/admin/Label
  - elements/admin/Help
  - elements/admin/FieldErrors
attrs:
  field: Any
  label: str
  help: str = ""
---
<div>
    <div class="flex items-center space-x-2">
        <Checkbox field={field} />
        <Label field={field}>{label}</Label>
        <Help :if={help} help={help} />
    </div>
    <FieldErrors field={field} />
</div>
