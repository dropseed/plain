[project]
name = "plain.support"
version = "0.34.1"
description = "Provides support forms for your application."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
dependencies = ["plain>=0.129.0,<1.0.0", "plain.postgres>=0.91.0,<1.0.0", "plain.auth<1.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
