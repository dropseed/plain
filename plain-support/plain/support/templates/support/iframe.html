---
imports:
  - from plain.assets.html import asset
  - from plain.tailwind.html import tailwind_css
attrs:
  panel: Any = ""
  request: plain.http.Request = None
---
<html>
    <head>
        {{ tailwind_css() }}
        <script src="{{ asset('support/iframe.js') }}" nonce="{{ request.csp_nonce }}"></script>
    </head>
    <body>
        {{ panel }}
    </body>
</html>
