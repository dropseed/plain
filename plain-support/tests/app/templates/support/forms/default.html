{# App-supplied support form template (apps provide their own — see the
   package README). This one renders per-field errors so the invalid-
   submission path is observable. #}
<form method="post" action="{{ form_action }}">
  {% for field in form %}
  <p>
    <label for="{{ field.html_id }}">{{ field.html_name }}</label>
    <input
      type="text"
      name="{{ field.html_name }}"
      id="{{ field.html_id }}"
      value="{{ field.value() or '' }}"
      >
    {% for error in field.errors %}
    <span class="form-error" data-field-error="{{ field.html_name }}">{{ error }}</span>
    {% endfor %}
  </p>
  {% endfor %}
  <button type="submit">Submit</button>
</form>
