[project]
name = "plain.loginlink"
version = "0.21.5"
description = "Link-based authentication for Plain."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
dependencies = [
  "plain>=0.145.0,<1.0.0",
  "plain.email>=0.19.3,<1.0.0",
  "plain.templates>=0.1.0,<1.0.0",
]

[dependency-groups]
# Test-only: the views integrate with plain.auth for session management.
dev = ["plain.pytest<1.0.0", "plain.auth<1.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
