[project]
name = "plain.oauth"
version = "0.50.0"
description = "Let users log in with OAuth providers."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
license = "BSD-3-Clause"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "plain>=0.145.0,<1.0.0",
  "plain.auth>=0.29.0,<1.0.0",
  "plain.postgres>=0.106.0,<1.0.0",
  "plain.templates>=0.1.0,<1.0.0",
]


[dependency-groups]
dev = ["plain.pytest<1.0.0", "httpx>=0.27"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
