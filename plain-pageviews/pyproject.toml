[project]
name = "plain.pageviews"
version = "0.35.6"
description = "Track pageviews from the client-side."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
dependencies = ["plain>=0.134.0,<1.0.0", "plain.postgres>=0.98.0,<1.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
