# Baseline of MCP conformance scenarios that plain-mcp does not yet pass.
# Most of these require features we haven't implemented (prompts, logging,
# subscriptions, completions, URI templates, binary/image/audio content,
# elicitation, JSON Schema 2020-12).
#
# When we ship one of these features, remove its entry from this file —
# the conformance CLI will exit 1 on "stale baseline" to force the update.
#
# Exit-code semantics (--expected-failures):
#   fail + expected  -> exit 0
#   fail + unexpected -> exit 1  (regression)
#   pass + expected  -> exit 1  (stale baseline)
#   pass + unexpected -> exit 0  (normal pass)

server:
  # Prompts capability — not implemented.
  - prompts-list
  - prompts-get-simple
  - prompts-get-with-args
  - prompts-get-embedded-resource
  - prompts-get-with-image

  # Logging capability — not implemented.
  - logging-set-level
  - tools-call-with-logging

  # Resource subscriptions — not implemented.
  - resources-subscribe
  - resources-unsubscribe

  # Resource templates — not implemented.
  - resources-templates-read

  # Completions — not implemented.
  - completion-complete

  # Non-text tool content (image/audio/embedded/mixed) — not implemented.
  - tools-call-image
  - tools-call-audio
  - tools-call-embedded-resource
  - tools-call-mixed-content

  # Binary resources (base64 blob) — not implemented.
  - resources-read-binary

  # Progress notifications on tools/call — not implemented.
  - tools-call-with-progress

  # Sampling (server-initiated LLM calls) — not implemented.
  - tools-call-sampling

  # Elicitation — not implemented.
  - tools-call-elicitation
  - elicitation-sep1034-defaults
  - elicitation-sep1330-enums

  # JSON Schema 2020-12 validation — we emit basic schemas only.
  - json-schema-2020-12

  # SEP-1699 SSE session management — we don't emit session IDs or SSE
  # streams on POST yet.
  - server-sse-polling
  - server-sse-multiple-streams
