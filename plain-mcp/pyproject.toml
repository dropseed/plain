[project]
name = "plain.mcp"
version = "0.1.0"
description = "MCP (Model Context Protocol) server for Plain apps."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
dependencies = ["plain>=0.129.0,<1.0.0"]

[dependency-groups]
dev = ["plain.pytest<1.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
