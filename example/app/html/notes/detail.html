<template :include="base">
<template slot="title">{note.title}</template>
<div class="max-w-2xl mx-auto px-5 py-12">
    <template :include="components/back_link" href={url('notes:list')} label="Back to notes" />

    <h1 class="page-h1">{note.title}</h1>
    <div class="mt-2 text-[12px] font-mono text-muted">
        Created {note.created_at.strftime("%Y-%m-%d %H:%M")}
        <template :if={note.updated_at != note.created_at}>
        · updated {note.updated_at.strftime("%Y-%m-%d %H:%M")}
        </template>
    </div>

    <div :if={note.body} class="mt-6 text-sm text-body whitespace-pre-wrap leading-relaxed">{note.body}</div>
    <p :if={not note.body} class="mt-6 text-sm text-muted italic">No body.</p>

    <div class="mt-8 flex gap-2">
        <a href={url('notes:update', id=note.id)} class="btn-primary">Edit</a>
        <a href={url('notes:delete', id=note.id)} class="btn-secondary">Delete</a>
    </div>
</div>
</template>
