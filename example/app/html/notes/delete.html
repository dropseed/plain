---
imports:
  - from plain.urls import reverse as url
attrs:
  note: app.notes.models.Note
---
<template :include="base">
<template slot="title">Delete {note.title}</template>
<div class="max-w-2xl mx-auto px-5 py-12">
    <template :include="components/back_link" href={url('notes:detail', id=note.id)} label="Back to note" />

    <h1 class="page-h1">Delete note</h1>
    <p class="mt-3 text-sm text-body">
        Are you sure you want to delete
        <span class="font-semibold text-ink">{note.title}</span>?
        This can't be undone.
    </p>

    <form method="post" class="mt-6 flex gap-2">
        <button type="submit" class="btn-danger">Delete</button>
        <a href={url('notes:detail', id=note.id)} class="btn-secondary">Cancel</a>
    </form>
</div>
</template>
