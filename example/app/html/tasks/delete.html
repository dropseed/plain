---
imports:
  - from plain.urls import reverse as url
attrs:
  task: app.tasks.models.Task
---
<template :include="base">
<template slot="title">Delete {task.title}</template>
<div class="max-w-2xl mx-auto px-5 py-12">
    <template :include="components/back_link" href={url('tasks:detail', id=task.id)} label="Cancel" />

    <h1 class="page-h1">Delete this task?</h1>
    <p class="mt-3 text-sm text-body">
        <span class="font-semibold text-ink">{task.title}</span>
    </p>

    <form method="post" class="mt-6">
        <button type="submit" class="btn-danger">Yes, delete</button>
    </form>
</div>
</template>
