---
imports:
  - from plain.urls import reverse as url
components:
  - base as Base
  - components/BackLink
  - tasks/_form_partial as TaskFormFields
attrs:
  form: Any
  form_class: Any
  task: app.tasks.models.Task
---
<Base>
    {% slot "title" %}Edit {{ task.title }}{% endslot %}
    <div class="max-w-2xl mx-auto px-5 py-12">
        <BackLink href="{{ url('tasks:detail', id=task.id) }}" label="Back to task" />
        <h1 class="page-h1">Edit task</h1>
        <form method="post" class="mt-6 flex flex-col gap-5">
            <TaskFormFields form="{{ form }}" form_class="{{ form_class }}" />
            <div class="flex items-center gap-2">
            <button type="submit" class="btn-primary">Save</button>
            <a href="{{ url('tasks:delete', id=task.id) }}" class="btn-secondary">Delete</a>
        </div>
        </form>
    </div>
</Base>
