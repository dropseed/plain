{% extends "base.html" %}
{% from "_macros.html" import back_link %}

{% block title %}Edit {{ task.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-5 py-12">
    {{ back_link(url('tasks:detail', id=task.id), "Back to task") }}

    <h1 class="page-h1">Edit task</h1>

    <form method="post" class="mt-6 flex flex-col gap-5">
        {% include "tasks/_form_partial.html" %}

        <div class="flex items-center gap-2">
            <button type="submit" class="btn-primary">Save</button>
            <a href="{{ url('tasks:delete', id=task.id) }}" class="btn-secondary">Delete</a>
        </div>
    </form>
</div>
{% endblock %}
