---
imports:
  - from plain.urls import reverse as url
attrs:
  tasks: list[app.tasks.models.Task]
---
<template :include="base">
<template slot="title">Tasks</template>
<div class="max-w-3xl mx-auto px-5 py-12">
    <template :include="components/back_link" href={url('index')} label="Back to index" />

    <div class="flex items-end justify-between gap-4">
        <h1 class="page-h1">Tasks</h1>
        <div class="flex gap-2">
            <a href={url('tasks:seed')} class="btn-secondary">Seed projects + tags</a>
            <a href={url('tasks:create')} class="btn-primary">New task</a>
        </div>
    </div>

    <p class="mt-3 text-sm text-muted max-w-2xl">
        ModelForm with FK (project), M2M (tags), choice (priority), date (due_date),
        boolean (is_complete), and a cross-field <span class="font-mono text-body">clean()</span>.
    </p>

    <ul :if={tasks} class="list-card mt-6">
        <li :for={task in tasks}>
            <a href={url('tasks:detail', id=task.id)} class="block px-4 py-3 hover:bg-warm-tint transition-colors no-underline">
                <div class="flex items-baseline justify-between gap-3">
                    <div class={["text-sm", "font-semibold", "line-through text-muted" if task.is_complete else "text-ink"]}>{task.title}</div>
                    <div class="text-[12px] text-muted whitespace-nowrap">
                        {task.priority}<template :if={task.due_date}> · due <span class="font-mono">{task.due_date}</span></template>
                    </div>
                </div>
                <div class="text-[12px] text-muted mt-1">
                    <template :if={task.project}>{task.project.name}</template><template :if={not task.project}><span class="italic">No project</span></template>
                    <template :for={tag in task.tags.query}> · #{tag.name}</template>
                </div>
            </a>
        </li>
    </ul>
    <p :if={not tasks} class="mt-6 text-sm text-muted">
        No tasks yet — start with <a class="body-link" href={url('tasks:seed')}>seeding</a>, then create one.
    </p>
</div>
</template>
