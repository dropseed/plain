---
imports:
  - from plain.forms import field_value
components:
  - components/NonfieldErrors
  - components/Field
  - components/FieldErrors
attrs:
  form: Any
  form_class: Any
  value: Any = None
---
<NonfieldErrors form="{{ form }}" />
<Field
    form="{{ form }}"
    field="{{ form_class.title }}"
    label="Title"
    autofocus="{{ True }}"
    required="{{ True }}"
/>
<Field form="{{ form }}" field="{{ form_class.project }}" label="Project" type="select" />
<Field form="{{ form }}" field="{{ form_class.notes }}" label="Notes" type="textarea" min_height="120px" />
<div class="grid grid-cols-2 gap-4">
    <Field form="{{ form }}" field="{{ form_class.due_date }}" label="Due date" type="date" />
    <Field form="{{ form }}" field="{{ form_class.priority }}" label="Priority" type="select" />
</div>
<label class="flex items-center gap-2 text-sm text-body">
    <input
        type="checkbox"
        name="{{ form_class.is_complete.name }}"
        id="{{ form_class.is_complete.html_id }}"
        checked="{{ bool(field_value(form, form_class.is_complete)) }}"
    >
    Complete
</label>
<div>
    <label class="field-label" for="{{ form_class.tags.html_id }}">Tags</label>
    <select
        class="field-input h-32"
        name="{{ form_class.tags.name }}"
        id="{{ form_class.tags.html_id }}"
        multiple
    >
        {% for (value, label) in form_class.tags.choices %}
            <option
                value="{{ value }}"
                selected="{{ str(value) in [str(v) for v in (field_value(form, form_class.tags) or [])] }}"
            >{{ label }}</option>
        {% endfor %}
    </select>
    <FieldErrors form="{{ form }}" field="{{ form_class.tags }}" />
</div>
