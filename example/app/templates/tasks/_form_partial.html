---
components:
  - components/NonfieldErrors
  - components/Field
  - components/FieldErrors
attrs:
  form: Any
  value: Any = None
---
<NonfieldErrors form={{ form }} />
<Field bf={{ form.title }} label="Title" autofocus={{ True }} required={{ True }} />
<Field bf={{ form.project }} label="Project" type="select" />
<Field bf={{ form.notes }} label="Notes" type="textarea" min_height="120px" />
<div class="grid grid-cols-2 gap-4">
    <Field bf={{ form.due_date }} label="Due date" type="date" />
    <Field bf={{ form.priority }} label="Priority" type="select" />
</div>
<label class="flex items-center gap-2 text-sm text-body">
    <input
        type="checkbox"
        name={{ form.is_complete.html_name }}
        id={{ form.is_complete.html_id }}
        checked={{ form.is_complete.value() }}
    >
    Complete
</label>
<div>
    <label class="field-label" for={{ form.tags.html_id }}>Tags</label>
    <select
        class="field-input h-32"
        name={{ form.tags.html_name }}
        id={{ form.tags.html_id }}
        multiple
    >
        {% for (value, label) in form.tags.field.choices %}
            <option
                value={{ value }}
                selected={{ str(value) in [str(v) for v in (form.tags.value() or [])] }}
            >{{ label }}</option>
        {% endfor %}
    </select>
    <FieldErrors bf={{ form.tags }} />
</div>
