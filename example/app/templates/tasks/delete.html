{% extends "base.html" %}

{% block title %}Delete {{ task.title }}{% endblock %}

{% block content %}
<div class="p-8 max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="{{ url('tasks:detail', id=task.id) }}" class="text-sm text-blue-500 hover:underline">
            ← Cancel
        </a>
    </div>

    <h1 class="text-2xl font-bold mb-2">Delete this task?</h1>
    <p class="text-stone-700 mb-6">{{ task.title }}</p>

    <form method="post">
        <button
            type="submit"
            class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
        >Yes, delete</button>
    </form>
</div>
{% endblock %}
