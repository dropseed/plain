{% extends "base.html" %}

{% block title %}New task{% endblock %}

{% block content %}
<div class="p-8 max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="{{ url('tasks:list') }}" class="text-sm text-blue-500 hover:underline">
            ← Back to tasks
        </a>
    </div>

    <h1 class="text-2xl font-bold mb-4">New task</h1>

    <form method="post" class="flex flex-col">
        {% include "tasks/_form_partial.html" %}

        <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4 self-start"
        >Create</button>
    </form>
</div>
{% endblock %}
