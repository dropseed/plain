{% extends "base.html" %}
{% from "_macros.html" import back_link %}

{% block title %}New task{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-5 py-12">
    {{ back_link(url('tasks:list'), "Back to tasks") }}

    <h1 class="page-h1">New task</h1>

    <form method="post" class="mt-6 flex flex-col gap-5">
        {% include "tasks/_form_partial.html" %}
        <button type="submit" class="btn-primary self-start">Create</button>
    </form>
</div>
{% endblock %}
