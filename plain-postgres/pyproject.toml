[project]
name = "plain.postgres"
version = "0.111.2"
description = "Model your data and store it in a database."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
dependencies = ["plain>=0.134.0,<1.0.0", "psycopg>=3.2", "psycopg-pool>=3.2"]

[project.entry-points."plain.setup"]
"postgres-setup" = "plain.postgres.entrypoints:setup"

# Test lifecycle discovered by plain.testing
[project.entry-points."plain.testing"]
"postgres" = "plain.postgres.test.lifecycle:PostgresTestLifecycle"

[dependency-groups]
dev = ["plain.testing<1.0.0", "plain.templates>=0.1.0,<1.0.0", "opentelemetry-sdk>=1.34.1", "cryptography"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
