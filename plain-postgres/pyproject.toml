[project]
name = "plain.postgres"
version = "0.97.0"
description = "Model your data and store it in a database."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.13"
dependencies = ["plain>=0.132.0,<1.0.0", "sqlparse>=0.3.1", "psycopg>=3.2", "psycopg-pool>=3.2"]

[project.entry-points."plain.setup"]
"postgres-setup" = "plain.postgres.entrypoints:setup"

# Automatically sets this up with pytest
[project.entry-points."pytest11"]
"plain.postgres" = "plain.postgres.test.pytest"

[dependency-groups]
dev = ["plain.pytest<1.0.0", "opentelemetry-sdk>=1.34.1"]

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
