[project]
name = "plain.testing"
version = "0.1.0"
description = "Plain's own test runner."
authors = [{ name = "Dave Gaeddert", email = "dave.gaeddert@dropseed.dev" }]
license = "BSD-3-Clause"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "plain>=0.137.0,<1.0.0",
  "click>=8.0.0",
  "opentelemetry-sdk>=1.34.1",
]

[project.entry-points."plain.setup"]
"testing-setup" = "plain.testing.entrypoints:setup"

[tool.hatch.build.targets.wheel]
packages = ["plain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
